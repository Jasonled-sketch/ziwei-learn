<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0E0C1A">
<title>紫微斗數 · 星曜研習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E0C1A; --bg2:#141126; --panel:#1B1736; --panel2:#231E45; --raise:#2A2451;
  --line:#332C5A; --line2:#413970;
  --purple:#9C7CF0; --purple-d:#6B4FC0; --purple-glow:rgba(156,124,240,.35);
  --gold:#E7C57D; --gold-d:#C7A45B; --gold-glow:rgba(231,197,125,.25);
  --text:#ECE8F8; --muted:#9E97C4; --muted2:#77719A;
  --rose:#E68CB4; --red:#E06A50; --green:#68C79C; --cyan:#68B7D6;
  --ok:#68C79C; --no:#E06A50;
  --r:16px; --r-sm:11px;
  --sh:0 10px 30px rgba(0,0,0,.45);
  --maxw:820px;
  /* v5.0 五行色（卡框用；圖騰 STAR_COLOR 不動） */
  --wx-wood:#68C79C; --wx-wood-b:#8FDDB8;
  --wx-fire:#E06A50; --wx-fire-b:#F2937D;
  --wx-earth:#E7C57D; --wx-earth-b:#F2D9A4;
  --wx-metal:#C9CFE0; --wx-metal-b:#E3E7F2;
  --wx-water:#68B7D6; --wx-water-b:#92CDE6;
  --wx-wood-glow:rgba(104,199,156,.35); --wx-fire-glow:rgba(224,106,80,.35);
  --wx-earth-glow:rgba(231,197,125,.35); --wx-metal-glow:rgba(201,207,224,.30);
  --wx-water-glow:rgba(104,183,214,.35);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--text);
  font-family:"Noto Sans TC","PingFang TC","Microsoft JhengHei","Heiti TC",sans-serif;
  font-size:15px; line-height:1.65; min-height:100vh;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;
}
/* ---- 星空背景 ---- */
body::before{
  content:""; position:fixed; inset:0; z-index:-2; pointer-events:none;
  background:
    radial-gradient(1.5px 1.5px at 18% 22%, rgba(255,255,255,.9), transparent),
    radial-gradient(1.5px 1.5px at 68% 12%, rgba(231,197,125,.9), transparent),
    radial-gradient(1px 1px at 42% 38%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 84% 52%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.5px 1.5px at 12% 68%, rgba(156,124,240,.9), transparent),
    radial-gradient(1px 1px at 55% 78%, rgba(255,255,255,.7), transparent),
    radial-gradient(1px 1px at 90% 88%, rgba(255,255,255,.6), transparent),
    radial-gradient(1.2px 1.2px at 32% 92%, rgba(231,197,125,.7), transparent),
    radial-gradient(1px 1px at 76% 32%, rgba(255,255,255,.6), transparent),
    var(--bg);
  background-repeat:no-repeat;
}
body::after{
  content:""; position:fixed; inset:0; z-index:-2; pointer-events:none; opacity:.9;
  background:
    radial-gradient(60% 45% at 78% -6%, rgba(156,124,240,.16), transparent 70%),
    radial-gradient(50% 40% at 8% 108%, rgba(231,197,125,.10), transparent 70%);
}
@media (prefers-reduced-motion:no-preference){
  .twinkle{animation:tw 4s ease-in-out infinite}
  @keyframes tw{0%,100%{opacity:.25}50%{opacity:1}}
}
/* ---- 版面 ---- */
.wrap{max-width:var(--maxw);margin:0 auto;padding:0 16px calc(96px + env(safe-area-inset-bottom));min-height:100vh}
.topbar{
  position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:14px 4px 12px;margin:0 -4px;
  background:linear-gradient(180deg,var(--bg) 62%,transparent);
}
.brand{font-family:"Noto Serif TC",serif;font-weight:900;font-size:19px;letter-spacing:.06em;color:var(--gold);display:flex;align-items:baseline;gap:8px}
.brand-sub{font-family:"Noto Sans TC",sans-serif;font-weight:400;font-size:11px;letter-spacing:.28em;color:var(--muted2)}
.lvpill{
  border:1px solid var(--line2);background:linear-gradient(135deg,var(--panel2),var(--panel));
  color:var(--text);border-radius:999px;padding:7px 14px;font-size:12.5px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:7px;white-space:nowrap;box-shadow:0 0 0 1px rgba(156,124,240,.06)
}
.lvpill b{color:var(--purple)}
.lvpill:active{transform:scale(.96)}
.view{animation:fade .28s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

/* ---- 底部導航 ---- */
.nav{
  position:fixed;left:0;right:0;bottom:0;z-index:50;
  display:flex;justify-content:center;gap:4px;
  padding:8px 10px calc(8px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,var(--bg) 72%,transparent);
  backdrop-filter:blur(8px);
}
.nav-inner{display:flex;gap:4px;background:var(--panel);border:1px solid var(--line);border-radius:999px;padding:5px;box-shadow:var(--sh);max-width:var(--maxw);width:100%;}
.nav button{
  flex:1;border:0;background:transparent;color:var(--muted);font-family:inherit;font-size:12px;font-weight:600;
  padding:9px 4px;border-radius:999px;cursor:pointer;transition:.18s;display:flex;flex-direction:column;align-items:center;gap:3px;line-height:1
}
.nav button .ic{font-size:16px;line-height:1}
.nav button.on{background:linear-gradient(135deg,var(--purple-d),var(--purple));color:#fff;box-shadow:0 4px 14px var(--purple-glow)}
.nav button:active{transform:scale(.93)}

/* ---- 通用元件 ---- */
.eyebrow{font-size:11px;letter-spacing:.28em;color:var(--gold-d);font-weight:700;text-transform:uppercase;margin:0 0 8px}
h2.title{font-family:"Noto Serif TC",serif;font-weight:900;font-size:24px;letter-spacing:.04em;margin:0 0 4px}
.lead{color:var(--muted);font-size:13.5px;margin:0 0 18px}
.section-gap{height:26px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:1fr 1fr}
.card{
  background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);
  border-radius:var(--r);padding:16px;box-shadow:var(--sh);position:relative;overflow:hidden
}
.tap{cursor:pointer;transition:transform .14s, border-color .18s}
.tap:active{transform:scale(.985)}
.tap:hover{border-color:var(--line2)}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px;border:1px solid var(--line2);color:var(--muted);white-space:nowrap}
.chip.gold{color:var(--gold);border-color:var(--gold-d);background:var(--gold-glow)}
.chip.purple{color:var(--purple);border-color:var(--purple-d);background:var(--purple-glow)}
.chip.rose{color:var(--rose);border-color:rgba(230,140,180,.5)}
.chip.red{color:var(--red);border-color:rgba(224,106,80,.5)}
.chip.green{color:var(--green);border-color:rgba(104,199,156,.5)}
.chip.cyan{color:var(--cyan);border-color:rgba(104,183,214,.5)}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}

.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:8px;width:100%;
  border:0;border-radius:13px;padding:14px 18px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer;transition:.16s
}
.btn-p{background:linear-gradient(135deg,var(--purple-d),var(--purple));color:#fff;box-shadow:0 8px 22px var(--purple-glow)}
.btn-g{background:linear-gradient(135deg,var(--gold-d),var(--gold));color:#241a06;box-shadow:0 8px 22px var(--gold-glow)}
.btn-ghost{background:var(--panel);color:var(--text);border:1px solid var(--line2)}
.btn:active{transform:translateY(1px) scale(.99);filter:brightness(1.05)}
.btn:disabled{opacity:.4;cursor:default;filter:none}

/* ---- 進度條 ---- */
.bar{height:8px;border-radius:999px;background:var(--bg2);overflow:hidden;border:1px solid var(--line)}
.bar > i{display:block;height:100%;border-radius:999px;background:linear-gradient(90deg,var(--purple),var(--gold));transition:width .6s cubic-bezier(.22,1,.36,1)}
.bar.thin{height:6px}

/* ---- Home 英雄區 ---- */
.hero{
  border:1px solid var(--line2);border-radius:22px;padding:24px 20px;margin:4px 0 22px;position:relative;overflow:hidden;
  background:
    radial-gradient(120% 90% at 88% -20%, rgba(156,124,240,.28), transparent 60%),
    radial-gradient(90% 80% at -10% 120%, rgba(231,197,125,.16), transparent 60%),
    linear-gradient(160deg,var(--panel2),var(--bg2));
  box-shadow:var(--sh)
}
.hero .seal{position:absolute;right:-14px;top:-10px;font-family:"Noto Serif TC",serif;font-weight:900;font-size:120px;color:rgba(231,197,125,.06);line-height:1;pointer-events:none;user-select:none}
.hero h1{font-family:"Noto Serif TC",serif;font-weight:900;font-size:30px;letter-spacing:.05em;margin:0;color:var(--text)}
.hero h1 span{color:var(--gold)}
.hero .tag{color:var(--muted);font-size:13px;margin:6px 0 18px;letter-spacing:.02em}
.rankrow{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:10px}
.rankname{font-family:"Noto Serif TC",serif;font-weight:700;font-size:17px;color:var(--gold)}
.rankname small{font-family:"Noto Sans TC",sans-serif;font-weight:700;color:var(--purple);font-size:13px;margin-right:8px}
.xpnum{font-size:12px;color:var(--muted)}

.stats3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin:16px 0 4px}
.stat{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 10px;text-align:center}
.stat b{display:block;font-family:"Noto Serif TC",serif;font-size:22px;font-weight:900;color:var(--text);line-height:1.2}
.stat span{font-size:11px;color:var(--muted)}
.stat.gold b{color:var(--gold)} .stat.purple b{color:var(--purple)} .stat.green b{color:var(--green)}

/* Home 入口磚 */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.tile{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line);border-radius:var(--r);padding:16px;cursor:pointer;transition:.16s;position:relative;overflow:hidden;min-height:104px;display:flex;flex-direction:column;justify-content:space-between}
.tile:active{transform:scale(.98)}
.tile:hover{border-color:var(--line2)}
.tile .em{font-size:26px}
.tile h3{font-family:"Noto Serif TC",serif;font-size:17px;font-weight:700;margin:6px 0 2px}
.tile p{font-size:11.5px;color:var(--muted);margin:0}
.tile .mini{margin-top:8px}
.tile.big{grid-column:1 / -1;flex-direction:row;align-items:center;gap:16px;min-height:0}
.tile.big .em{font-size:30px}
.tile.big > div{flex:1}

/* ---- 學習卡列表 ---- */
.hub{display:grid;gap:12px}
.hubcard{display:flex;align-items:center;gap:14px;padding:15px 16px}
.hubcard .em{font-size:28px;width:46px;text-align:center}
.hubcard .info{flex:1;min-width:0}
.hubcard h3{font-family:"Noto Serif TC",serif;font-size:17px;font-weight:700;margin:0 0 3px}
.hubcard .info p{margin:0 0 7px;font-size:12px;color:var(--muted)}
.hubcard .arrow{color:var(--muted2);font-size:20px}

.cardlist{display:grid;gap:10px}
.lc{display:flex;align-items:center;gap:13px;padding:14px 15px}
.lc .gly{
  width:44px;height:44px;flex:none;border-radius:12px;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Serif TC",serif;font-weight:900;font-size:20px;color:var(--gold);
  background:radial-gradient(circle at 30% 25%, rgba(231,197,125,.22), rgba(156,124,240,.12));border:1px solid var(--line2)
}
.lc.pp .gly{color:var(--purple);background:radial-gradient(circle at 30% 25%, var(--purple-glow), rgba(231,197,125,.08))}
.lc .body{flex:1;min-width:0}
.lc .body h4{margin:0 0 2px;font-family:"Noto Serif TC",serif;font-size:16.5px;font-weight:700}
.lc .body .sub{font-size:11.5px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lc .mk{font-size:20px;color:var(--muted2);flex:none}
.lc.done{border-color:var(--gold-d)}
.lc.done .mk{color:var(--gold)}
.grouphdr{display:flex;align-items:center;gap:9px;margin:20px 2px 10px;font-family:"Noto Serif TC",serif;font-weight:700;font-size:15px;color:var(--muted)}
.grouphdr::after{content:"";flex:1;height:1px;background:var(--line)}

/* ---- 命盤格 (十二宮) ---- */
.chart{display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(4,1fr);gap:8px;aspect-ratio:1/1;max-width:560px;margin:2px auto 0}
.cell{
  border:1px solid var(--line);border-radius:12px;background:linear-gradient(160deg,var(--panel2),var(--panel));
  padding:8px 6px;cursor:pointer;transition:.16s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-align:center;min-width:0
}
.cell:active{transform:scale(.96)} .cell:hover{border-color:var(--purple-d)}
.cell .nm{font-family:"Noto Serif TC",serif;font-weight:700;font-size:15px;color:var(--gold);line-height:1.15}
.cell .zh{font-size:9px;color:var(--muted2);letter-spacing:.1em}
.cell.done{border-color:var(--gold-d);background:linear-gradient(160deg,rgba(231,197,125,.14),var(--panel))}
.cell.done .nm::after{content:" ✦";color:var(--gold);font-size:11px}
.center{grid-column:2 / 4;grid-row:2 / 4;border:1px solid var(--line2);border-radius:14px;background:radial-gradient(circle at 50% 40%, rgba(156,124,240,.14), var(--bg2));display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:10px}
.center .big{font-family:"Noto Serif TC",serif;font-weight:900;font-size:clamp(30px,9vw,44px);color:var(--gold);line-height:1}
.center .cap{font-size:10.5px;color:var(--muted);letter-spacing:.14em}
.center .pg{width:70%;margin-top:2px}
.note{background:var(--panel);border:1px dashed var(--line2);border-radius:12px;padding:12px 14px;font-size:12.5px;color:var(--muted);margin-top:16px;line-height:1.7}
.note b{color:var(--gold-d)}

/* ---- Modal 卡片詳情 ---- */
.modal{position:fixed;inset:0;z-index:100;display:flex;align-items:flex-end;justify-content:center;background:rgba(6,5,14,.72);backdrop-filter:blur(4px);animation:fade .2s}
.sheet{
  width:100%;max-width:var(--maxw);max-height:90vh;overflow-y:auto;background:linear-gradient(180deg,var(--bg2),var(--panel));
  border:1px solid var(--line2);border-bottom:0;border-radius:22px 22px 0 0;padding:8px 18px calc(24px + env(safe-area-inset-bottom));
  animation:slideup .32s cubic-bezier(.22,1,.36,1);box-shadow:0 -20px 50px rgba(0,0,0,.5)
}
@keyframes slideup{from{transform:translateY(100%)}to{transform:none}}
.grab{width:40px;height:4px;border-radius:99px;background:var(--line2);margin:8px auto 14px}
.sheet .head{display:flex;align-items:center;gap:14px;margin-bottom:6px}
.sheet .glyphL{
  width:60px;height:60px;flex:none;border-radius:16px;display:flex;align-items:center;justify-content:center;
  font-family:"Noto Serif TC",serif;font-weight:900;font-size:28px;color:var(--gold);
  background:radial-gradient(circle at 30% 25%, rgba(231,197,125,.25), rgba(156,124,240,.14));border:1px solid var(--line2)
}
.sheet .glyphL.pp{color:var(--purple)}
.sheet .head h2{font-family:"Noto Serif TC",serif;font-size:25px;font-weight:900;margin:0 0 5px}
.sheet .head .row{display:flex;gap:6px;flex-wrap:wrap}
.field{padding:12px 0;border-top:1px solid var(--line)}
.field:first-of-type{border-top:0}
.field .k{font-size:11.5px;letter-spacing:.16em;color:var(--gold-d);font-weight:700;margin-bottom:4px}
.field .v{font-size:14px;color:var(--text);line-height:1.7}
.core-box{background:linear-gradient(135deg,var(--panel2),var(--bg2));border:1px solid var(--line2);border-radius:14px;padding:14px;margin:10px 0 4px}
.core-box .k{font-size:11px;letter-spacing:.16em;color:var(--gold-d);font-weight:700;margin-bottom:5px}
.core-box .v{font-family:"Noto Serif TC",serif;font-size:17px;font-weight:700;color:var(--gold);line-height:1.55}
.mnem{background:radial-gradient(circle at 20% 20%, var(--purple-glow), var(--panel));border:1px solid var(--purple-d);border-radius:14px;padding:13px 15px;margin-top:12px;display:flex;gap:10px;align-items:flex-start}
.mnem .k{color:var(--purple);font-weight:700;font-size:12px;flex:none}
.mnem .v{font-family:"Noto Serif TC",serif;font-size:15.5px;color:var(--text)}
.sheet .actions{margin-top:16px;display:grid;gap:10px}
.doneflag{display:flex;align-items:center;justify-content:center;gap:8px;color:var(--gold);font-weight:700;font-size:14px;padding:12px;border:1px solid var(--gold-d);border-radius:13px;background:var(--gold-glow)}

/* ---- 測驗 ---- */
.qhub-mode{display:grid;gap:12px}
.modecard{display:flex;align-items:center;gap:14px;padding:16px}
.modecard .em{font-size:26px;width:44px;text-align:center}
.modecard .info{flex:1}
.modecard h3{font-family:"Noto Serif TC",serif;font-size:17px;margin:0 0 2px}
.modecard p{margin:0;font-size:12px;color:var(--muted)}
.modecard .arrow{color:var(--muted2);font-size:20px}
.topicpick{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:4px}
.topicpick button{padding:16px 12px;border-radius:14px;border:1px solid var(--line2);background:var(--panel);color:var(--text);font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;transition:.15s;text-align:left}
.topicpick button:active{transform:scale(.97)}
.topicpick button span{display:block;font-weight:400;font-size:11px;color:var(--muted);margin-top:3px}

.qwrap{max-width:560px;margin:0 auto}
.qtop{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;font-size:12px;color:var(--muted)}
.qprog{margin-bottom:18px}
.qcard{background:linear-gradient(160deg,var(--panel2),var(--panel));border:1px solid var(--line2);border-radius:18px;padding:20px 18px;box-shadow:var(--sh)}
.qtype{font-size:11px;letter-spacing:.16em;color:var(--gold-d);font-weight:700;margin-bottom:8px}
.qtext{font-family:"Noto Serif TC",serif;font-size:19px;font-weight:700;line-height:1.6;margin:0 0 18px}
.opts{display:grid;gap:10px}
.opt{display:flex;align-items:center;gap:11px;padding:14px 15px;border:1px solid var(--line2);border-radius:13px;background:var(--panel);cursor:pointer;transition:.14s;font-size:14.5px}
.opt:active{transform:scale(.98)}
.opt .box{width:22px;height:22px;flex:none;border-radius:7px;border:1.5px solid var(--line2);display:flex;align-items:center;justify-content:center;font-size:13px;color:transparent;transition:.14s}
.opt.multi .box{border-radius:50%}
.opt.sel{border-color:var(--purple);background:rgba(156,124,240,.12)}
.opt.sel .box{background:var(--purple);border-color:var(--purple);color:#fff}
.opt.correct{border-color:var(--ok);background:rgba(104,199,156,.14)}
.opt.correct .box{background:var(--ok);border-color:var(--ok);color:#08120c}
.opt.wrong{border-color:var(--no);background:rgba(224,106,80,.13)}
.opt.wrong .box{background:var(--no);border-color:var(--no);color:#160604}
.opt.locked{cursor:default}
.fillbox{width:100%;padding:15px 16px;border:1px solid var(--line2);border-radius:13px;background:var(--panel);color:var(--text);font-family:"Noto Serif TC",serif;font-size:18px;text-align:center;letter-spacing:.1em}
.fillbox:focus{outline:2px solid var(--purple);border-color:var(--purple)}
.matchrow{display:flex;align-items:center;gap:10px;padding:9px 0}
.matchrow .ml{font-family:"Noto Serif TC",serif;font-weight:700;font-size:16px;flex:none;min-width:64px;color:var(--gold)}
.matchrow select{flex:1;padding:12px 12px;border-radius:12px;border:1px solid var(--line2);background:var(--panel);color:var(--text);font-family:inherit;font-size:14px}
.matchrow.mok .ml{color:var(--ok)} .matchrow.mno .ml{color:var(--no)}
.matchrow.mok select{border-color:var(--ok)} .matchrow.mno select{border-color:var(--no)}

.expl{margin-top:16px;border-radius:14px;padding:14px 15px;font-size:13.5px;line-height:1.7;animation:fade .3s;border:1px solid}
.expl.ok{background:rgba(104,199,156,.1);border-color:rgba(104,199,156,.4)}
.expl.no{background:rgba(224,106,80,.1);border-color:rgba(224,106,80,.4)}
.expl .r{font-family:"Noto Serif TC",serif;font-weight:700;font-size:15px;display:flex;align-items:center;gap:7px;margin-bottom:5px}

<script>
(function(){
  var firebaseConfig = {
    apiKey: "AIzaSyB-MgbNVlC5Cc_qM411zb2y3tB833kQ9VI",
    authDomain: "ziwei-learn.firebaseapp.com",
    projectId: "ziwei-learn",
    storageBucket: "ziwei-learn.firebasestorage.app",
    messagingSenderId: "39677127175",
    appId: "1:39677127175:web:f53beab40eca1c8aba98a2"
  };
  var ADMIN_EMAIL = 'covernself@gmail.com';

  firebase.initializeApp(firebaseConfig);
  var fbAuth = firebase.auth();
  var fbDb   = firebase.firestore();

  function setState(s){
    document.body.classList.remove('auth-checking','auth-needed','auth-denied','auth-ok');
    document.body.classList.add(s);
  }

  window.USLED_AUTH = {
    user:null,
    signIn:function(){
      var errEl = document.getElementById('auth-err');
      if(errEl) errEl.textContent='';
      var provider = new firebase.auth.GoogleAuthProvider();
      fbAuth.signInWithPopup(provider).catch(function(e){
        if(errEl) errEl.textContent='登入失敗: '+(e.message||e.code||'未知錯誤');
      });
    },
    signOut:function(){
      fbAuth.signOut().then(function(){ location.reload(); });
    },
    openAdmin:function(){
      USLED_AUTH.loadList();
      document.getElementById('admin-panel').classList.add('show');
    },
    closeAdmin:function(){
      document.getElementById('admin-panel').classList.remove('show');
    },
    loadList:function(){
      var ul = document.getElementById('admin-emails-list');
      ul.innerHTML = '<li class="admin-empty">載入中...</li>';
      fbDb.collection('allowed_emails').orderBy('addedAt','desc').get().then(function(snap){
        ul.innerHTML='';
        var adminLi = document.createElement('li');
        adminLi.innerHTML = '<span class="em em-admin">'+ADMIN_EMAIL+' (管理員)</span>';
        ul.appendChild(adminLi);
        if(snap.empty){
          var li = document.createElement('li');
          li.className = 'admin-empty';
          li.textContent = '尚未授權任何其他帳號';
          ul.appendChild(li);
          return;
        }
        snap.forEach(function(doc){
          var li = document.createElement('li');
          var span = document.createElement('span');
          span.className='em';
          span.textContent = doc.id;
          var btn = document.createElement('button');
          btn.className='del-btn';
          btn.textContent='移除';
          btn.onclick = function(){ USLED_AUTH.removeEmail(doc.id); };
          li.appendChild(span);
          li.appendChild(btn);
          ul.appendChild(li);
        });
      }).catch(function(e){
        ul.innerHTML = '<li class="admin-empty" style="color:#E06A50">讀取失敗: '+(e.message||e.code)+'</li>';
      });
    },
    addEmail:function(){
      var input = document.getElementById('admin-email-input');
      var email = (input.value||'').trim().toLowerCase();
      if(!email || email.indexOf('@')<0){ alert('請輸入有效 email'); return; }
      if(email === ADMIN_EMAIL){ alert('管理員已自動授權,無需新增'); return; }
      fbDb.collection('allowed_emails').doc(email).set({
        addedAt: firebase.firestore.FieldValue.serverTimestamp(),
        addedBy: (USLED_AUTH.user && USLED_AUTH.user.email) || 'unknown'
      }).then(function(){
        input.value='';
        USLED_AUTH.loadList();
      }).catch(function(e){
        alert('新增失敗: '+(e.message||e.code));
      });
    },
    removeEmail:function(email){
      if(!confirm('確定移除 '+email+' 的授權?')) return;
      fbDb.collection('allowed_emails').doc(email).delete().then(function(){
        USLED_AUTH.loadList();
      }).catch(function(e){
        alert('刪除失敗: '+(e.message||e.code));
      });
    }
  };

  fbAuth.onAuthStateChanged(function(user){
    if(!user){ setState('auth-needed'); return; }
    USLED_AUTH.user = user;
    setState('auth-checking');
    var email = (user.email||'').toLowerCase();
    if(email === ADMIN_EMAIL){
      document.body.classList.add('is-admin');
      setState('auth-ok');
      return;
    }
    fbDb.collection('allowed_emails').doc(email).get().then(function(doc){
      if(doc.exists){
        setState('auth-ok');
      } else {
        var d = document.getElementById('auth-denied-email');
        if(d) d.textContent = user.email;
        setState('auth-denied');
      }
    }).catch(function(e){
      var d = document.getElementById('auth-denied-email');
      if(d) d.textContent = (user.email||'')+' (檢查失敗: '+(e.message||e.code)+')';
      setState('auth-denied');
    });
  });
})();
</script>
<!-- USLED AUTH END (</head> 前) -->

  detail:"帝王的威嚴壓住七殺的殺氣，成為「化殺為權」——外表沉穩、內心剛硬，決斷力強、有威嚴。愛恨分明、說一不二，是能扛大局的鐵腕領導，但也容易讓人覺得難親近。", mn:"外靜內剛，鐵腕掌權"},
 {id:"ziwei_pojun", name:"紫微破軍", stars:["紫微","破軍"], type:"化學", core:"霸氣改革者，敢愛敢恨不受管束",
  detail:"帝王配上破軍的破壞力，是一個敢掀桌重來的霸氣改革者。不受傳統管束、敢愛敢恨、開創力強，適合開疆闢土，但人生起伏也大，衝過頭需要有人拉一把。", mn:"霸氣改革，敢破敢立"},
 {id:"wuqu_tianfu", name:"武曲天府", stars:["武曲","天府"], type:"物理", core:"雙財星，什麼錢都敢賺，易成富局",
  detail:"武曲財星（會賺）＋天府財庫（會守），兩顆財星同框，對錢的敏銳與掌控力加倍，什麼錢都敢賺也存得住，是紫微斗數裡最容易成「富局」的組合之一。缺點是可能太重利、生活較無情趣。", mn:"會賺又會守，財庫滿滿"},
 {id:"wuqu_qisha", name:"武曲七殺", stars:["武曲","七殺"], type:"物理", core:"拚命三郎，目標不到手不罷休",
  detail:"武曲的執行力＋七殺的衝鋒，是不折不扣的拚命三郎。目標一鎖定就全力衝刺、不達目的不罷休，事業戰鬥力極強。但過剛易折，要小心把身體和人際都拚掉了。", mn:"目標一咬住，絕不放手"},
 {id:"wuqu_pojun", name:"武曲破軍", stars:["武曲","破軍"], type:"化學", core:"工作狂＋夢想家，人生大起大落",
  detail:"務實的武曲遇上愛冒險的破軍，一個要穩、一個要衝，內在充滿矛盾張力——既是埋頭苦幹的工作狂，又是敢賭一把的夢想家。人生大起大落，賺得快也散得快。", mn:"又拚又賭，大起大落"},
 {id:"lianzhen_tianfu", name:"廉貞天府", stars:["廉貞","天府"], type:"化學", core:"鬥志＋規劃，一加一大於二",
  detail:"廉貞的企圖心與應變，配上天府的穩健規劃，剛好互補——有衝勁又有章法，能把野心落地執行。是典型「一加一大於二」的組合，事業上很有成就相。", mn:"有野心又有計畫"},
 {id:"lianzhen_tanlang", name:"廉貞貪狼", stars:["廉貞","貪狼"], type:"物理", core:"雙桃花同宮，人緣即助力也是功課",
  detail:"次桃花（廉貞）＋第一桃花（貪狼）同宮，魅力與人緣爆表，交際手腕一流，人脈就是最大的助力。但雙桃花也意味感情特別豐富複雜，節制與分寸是一生的功課。", mn:"人緣是助力，也是考題"},
 {id:"lianzhen_tianxiang", name:"廉貞天相", stars:["廉貞","天相"], type:"化學", core:"戰力＋協調，事業人和兼顧",
  detail:"廉貞的戰鬥力配上天相的協調與公正，剛柔並濟——既能衝鋒又能安內，事業與人和兼顧。是能獨當一面又不失圓融的組合，適合需要對外拚搏又對內協調的位置。", mn:"能衝能協調，剛柔並濟"},
 {id:"tiantong_tianliang", name:"天同天梁", stars:["天同","天梁"], type:"物理", core:"福星＋蔭星，與世無爭的貴人命",
  detail:"福星（天同）＋蔭星（天梁）相會，性情溫和、與世無爭、逢凶化吉，一生多貴人相助。適合公教、顧問、助人的行業，過得自在有福。缺點是企圖心偏弱、容易安逸。", mn:"溫和有福，貴人相隨"},
 {id:"taiyang_taiyin", name:"太陽太陰", stars:["太陽","太陰"], type:"化學", core:"日月同宮，文武雙全但情緒多變",
  detail:"太陽（外放、博愛）與太陰（內斂、細膩）同宮，等於一個人同時擁有陽剛與陰柔兩種能量，文武雙全、能屈能伸。但日月的矛盾也讓情緒較起伏、內心常在外放與內收之間擺盪。", mn:"日月同體，剛柔情緒兩極"},
 {id:"ziwei_tianxiang", name:"紫微天相", stars:["紫微","天相"], type:"物理", core:"帝王＋印星，穩重的協調型領導",
  detail:"帝王星配上掌印的天相，是個既有威儀、又懂協調服務的領導者。做事四平八穩、重視體面與規矩，很適合當需要威望又要面面俱到的管理者。缺點是有時太在意面子、決斷稍慢。", mn:"有威望又會做人"},
 {id:"wuqu_tanlang", name:"武曲貪狼", stars:["武曲","貪狼"], type:"化學", core:"財星＋桃花，中晚年爆發的橫財格",
  detail:"財星武曲配上慾望星貪狼，衝勁與野心兼具，是有名的「晚發」組合——年輕時打底、中晚年才大發（若再遇火星、鈴星成「火貪」「鈴貪」，更是一夕暴發）。精力旺、企圖心強，要留意別太貪快。", mn:"先蹲後跳，中晚年爆發"},
 {id:"wuqu_tianxiang", name:"武曲天相", stars:["武曲","天相"], type:"物理", core:"財星＋印星，務實又懂協調的實幹家",
  detail:"務實的武曲配上協調的天相，既能扛數字、拚結果，又懂得做人、講規矩，是可靠的實幹型幹部。適合財務、工程、管理等要責任感又要協調的位置。缺點是有時放不開、較硬。", mn:"能拚又能協調的老實幹將"},
 {id:"lianzhen_qisha", name:"廉貞七殺", stars:["廉貞","七殺"], type:"化學", core:"囚星＋將星，積極拚搏、路上顛簸",
  detail:"複雜多變的廉貞配上衝鋒的七殺，是股一往無前的狠勁——積極、能拚、敢扛，但人生路上比較顛簸辛勞，要靠意志力闖過。適合開創、業務、需要膽識與行動力的領域。", mn:"拚勁十足，但路要自己闖"},
 {id:"lianzhen_pojun", name:"廉貞破軍", stars:["廉貞","破軍"], type:"化學", core:"囚星＋耗星，敢衝敢變、大破大立",
  detail:"廉貞的複雜加上破軍的破壞創新，是個敢砍掉重練、勇於改革的組合。行動力強、不受拘束、變動大，適合開創與破局重建，但人生起伏大、先破後立較辛苦，成功後要學會守成。", mn:"敢掀桌重來的改革狂"},
 {id:"tianji_taiyin", name:"天機太陰", stars:["天機","太陰"], type:"物理", core:"智慧＋內斂，聰明細膩、善謀劃",
  detail:"動腦的天機配上細膩的太陰，心思特別縝密——聰明、敏感、善於規劃與觀察，很有企劃與研究的天分。缺點是想很多、情緒起伏，容易鑽牛角尖、猶豫不決。", mn:"心思細如髮，就是想太多"},
 {id:"tianji_jumen", name:"天機巨門", stars:["天機","巨門"], type:"化學", core:"智慧＋口才，機智善辯、靠腦袋和嘴",
  detail:"天機的機智配上巨門的口才，反應快、能言善道、分析力強，很適合靠腦袋和嘴巴吃飯（顧問、律師、老師、業務）。缺點是多疑、愛計較、容易嘴上招惹是非。", mn:"最會動腦又會講的組合"},
 {id:"tianji_tianliang", name:"天機天梁", stars:["天機","天梁"], type:"物理", core:"智慧＋蔭星，善策劃又有原則的軍師",
  detail:"天機的謀略配上天梁的原則與庇蔭，是既會出點子、又講原則、還能逢凶化吉的「軍師型」人物。愛動腦、愛分析、也愛照顧人與說教，適合企劃、顧問、教育、宗教命理。", mn:"有原則的點子軍師"},
 {id:"taiyang_jumen", name:"太陽巨門", stars:["太陽","巨門"], type:"化學", core:"光明＋口才，靠專業發聲揚名",
  detail:"太陽的博愛發光配上巨門的口才，很適合靠「說」與「專業」揚名——教學、演說、傳播、國際或跨文化領域特別吃香（古稱與異族有緣）。要留意口舌是非、別鋒芒太露。", mn:"靠一張嘴發光發熱"},
 {id:"taiyang_tianliang", name:"太陽天梁", stars:["太陽","天梁"], type:"物理", core:"光明＋蔭星，正直照顧人的貴人格",
  detail:"太陽的正直光明配上天梁的原則庇蔭，是個熱心、正派、愛照顧人的貴人型人物，很適合公職、教育、法律、監督。若再會文昌、祿存成「陽梁昌祿」格，更利讀書考試功名。", mn:"正直熱心的大貴人"},
 {id:"tiantong_taiyin", name:"天同太陰", stars:["天同","太陰"], type:"物理", core:"福星＋財星，溫柔享福、細膩多情",

 {id:"tiantong_jumen", name:"天同巨門", stars:["天同","巨門"], type:"化學", core:"福星＋口舌，口福好但易多是非勞碌",

/* 合併：以 DEFAULT 深拷貝為底補齊所有新欄位（巢狀物件逐層補，舊值優先、不覆蓋） */
function merge(r){
 r=r||{};
 const D=JSON.parse(JSON.stringify(DEFAULT)); /* 深拷貝，避免共用參照污染 DEFAULT */
 const o=Object.assign({},D,r);
 ["learned","quiz","streak","quest","daily","qday","sign","dex","counters","milestones"].forEach(k=>{o[k]=Object.assign({},D[k],r[k]);});
 o.dex.tries=Object.assign({},D.dex.tries,r.dex&&r.dex.tries);
 return o;
}
function load(){
 // 1) 先讀 v2
 try{const r=JSON.parse(localStorage.getItem(KEY));if(r&&r.learned)return merge(r);}catch(e){}
 // 2) 沒有 v2 → 讀 v1 無痛遷移：深拷貝＋補新欄位，寫回 v2（v1 保留不刪，當備份）
 try{const o=JSON.parse(localStorage.getItem(OLDKEY));if(o&&o.learned){const m=merge(o);try{localStorage.setItem(KEY,JSON.stringify(m));}catch(e){}return m;}}catch(e){}
 // 3) 全新使用者
 return JSON.parse(JSON.stringify(DEFAULT));
}

/* v5.0：todayStr 改「本地日期」（修 UTC 快 8 小時換日雷）；dayStr 為全站別名 */
const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
const dayStr=todayStr;
const utcDayStr=off=>new Date(Date.now()-(off||0)).toISOString().slice(0,10);
const localDayStr=off=>{const d=new Date(Date.now()-(off||0));return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};
/* 切換日守則：last 等於「UTC今天」或「本地今天」任一 → 視為今天（不斷 streak、不重複 +1）；
   昨天判定同樣接受 UTC/本地兩制，讓舊資料（UTC 制日期）無痛過渡 */
function touchStreak(){
 const t=todayStr();
 if(S.streak.last===t||S.streak.last===utcDayStr(0))return;
 const wasYesterday=(S.streak.last===localDayStr(864e5)||S.streak.last===utcDayStr(864e5));
 S.streak.count=wasYesterday?S.streak.count+1:1;
 S.streak.last=t;save();
}

const QUEST_CONSUMERS=[];
function questEvent(type,payload){
 payload=payload||{};

}

   該章卡片達 GATE → 該章「尚未存在或尚未 cleared」的關卡補標 {cleared:true,auto:true}；

function migrateQuest(){
 const L=S.learned;
 const pass={
  c1:L.palace.length>=LEARN_GATE.palace,
  c2:L.star.length>=LEARN_GATE.star,
  c3:L.sihua.length>=LEARN_GATE.sihua,
  c4:L.aux.length>=LEARN_GATE.aux,
  c5:L.duo.length>=LEARN_GATE.duo,
  c6:L.frame.length>=LEARN_GATE.frame,
  c7:L.daxian.length>=LEARN_GATE.daxian&&L.shensha.length>=LEARN_GATE.shensha,
  c8:!!S.cleared&&S.bestScore>=85
 };
 const at=todayStr();
 let changed=false;
 Object.keys(pass).forEach(c=>{
  if(!pass[c])return;
  CHAPTER_STAGES[c].forEach(st=>{
   const k=c+"_"+st,cur=S.quest.stages[k];
   if(cur&&cur.cleared)return;            /* 已通關（不論 auto 與否）→ 不動 */
   if(cur&&cur.auto===false)return;       /* 已存在的非 auto 真實紀錄 → 絕不覆蓋 */
   S.quest.stages[k]={cleared:true,best:(cur&&cur.best)||0,at:at,auto:true};
   changed=true;
  });
 });
 if(!S.quest.migrated){S.quest.migrated=true;changed=true;}
 if(changed)save();
}

/* ---- 關卡通關結算（唯一入口）：首次過關發 XP＋事件；已通關重打只更新 best ---- */
function clearStage(id,score){
 const prev=S.quest.stages[id];const first=!(prev&&prev.cleared);
 const cid=stageChapter(id),st=stageType(id);
 const wasDone=chapterDone(cid);
 const best=Math.max((prev&&prev.best)||0,score||0);
 S.quest.stages[id]={cleared:true,best:best,at:todayStr(),auto:false};
 let xp=0,chBonus=0;
 if(first){
  xp=stageXP(id);
  questEvent("stageClear",{stageId:id,chapterId:cid,type:st,rate:score||0});
 }
 if(st==="boss")questEvent("bossClear",{chapterId:cid,rate:score||0,firstTime:first});
 if(!wasDone&&chapterDone(cid)){
  if(cid!=="c8")chBonus=150; /* c8 終Boss 本身 +300，不再疊章節獎勵 */
  questEvent("chapterClear",{chapterId:cid});
 }
 save();
 if(xp+chBonus>0)addXP(xp+chBonus);
 return {first:first,xp:xp,chBonus:chBonus,best:best};
}

function sanfangSvg(sel,a){
 if(sel==null)return "";
 const selB=a.palaces[sel].earthlyBranch,oppB=OPP[selB],tri=sanheOther(selB);
 /* 端點連到「該宮朝內的邊框中點」；四角宮收在內角 */
 const c=b=>{const g=GPOS[b],col=g[0],row=g[1];
   const x=col===1?25:col===4?75:(col-0.5)*25;
   const y=row===1?25:row===4?75:(row-0.5)*25;
   return [x.toFixed(1),y.toFixed(1)];};
 const P=c(selB),T1=c(tri[0]),T2=c(tri[1]),O=c(oppB);
 return `<svg class="cs-lines" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
   <polygon points="${P[0]},${P[1]} ${T1[0]},${T1[1]} ${T2[0]},${T2[1]}" fill="rgba(104,183,214,.04)" stroke="#68B7D6" stroke-width="0.45" stroke-dasharray="1.4 1.1" opacity="0.85"/>
   <line x1="${P[0]}" y1="${P[1]}" x2="${O[0]}" y2="${O[1]}" stroke="#E06A50" stroke-width="0.5" stroke-dasharray="1.4 1.1" opacity="0.85"/>
 </svg>`;
}
function chartSanfang(idx){SFX.tap();CHART_SEL=(CHART_SEL===idx?null:idx);if(CHART_SEL!==null)questEvent("chart_palace",{palaceIdx:CHART_SEL});const el=document.getElementById("chartOut");if(el)el.innerHTML=renderChart(CHART);}
/* 宮干飛星四化：該宮宮干→四化四星→落在哪個宮（含自化偵測） */
function feihuaOf(a,idx){
 const p=a.palaces[idx];const gh=GANHUA[p.heavenlyStem];if(!gh)return null;
 const findP=name=>{for(let i=0;i<a.palaces.length;i++){if([...a.palaces[i].majorStars,...a.palaces[i].minorStars].some(s=>s.name===name))return i;}return -1;};
 return [["祿","lu","green"],["權","quan","purple"],["科","ke","cyan"],["忌","ji","red"]].map(function(r){
   const star=gh[r[1]];const loc=findP(star);
   return {label:r[0],color:r[2],star:star,loc:loc,locName:loc>=0?a.palaces[loc].name:"(未入盤)",self:loc===idx};
 });
}

 /* 正宗地支盤：巳午未申／辰　酉／卯　戌／寅丑子亥（示意：命宮在寅），對宮＝正對面、三合＝真正的地支三合三角 */

/* ---- v5.1 批3：今日複習（1/3/7 到期錯題） ---- */

/* ---- 測驗進行 ---- */
let Q={list:[],i:0,correct:0,answered:false,mode:"normal"};
/* v5.1 批3：opts 可帶 {stage,need,hearts}（關卡制）；combo 單場歸零 */
function startQuiz(list,mode,opts){if(!list||!list.length){toast("題庫不足");return;}
 Q={list,i:0,correct:0,answered:false,mode:mode||"normal",combo:0,hearts:0,stage:null,need:0,graduated:0,xpGain:0};
 if(opts)Object.assign(Q,opts);
 SFX.tap();renderQ();}
function heartsHTML(popIdx){return `<span class="hearts" id="qhearts">${[0,1,2].map(i=>`<span class="hh${i<Q.hearts?'':' lost'}${i===popIdx?' pop':''}">${i<Q.hearts?"❤️":"🖤"}</span>`).join("")}</span>`;}
function startWrongQuiz(){const ids=Object.keys(S.wrong).filter(id=>!S.wrong[id].resolved);const list=shuffle(QUESTIONS.filter(q=>ids.includes(q.id)));if(!list.length){toast("目前沒有錯題 ✦");return;}startQuiz(list,"wrong");}

function renderQ(){
 const q=Q.list[Q.i];Q.answered=false;Q.sel=(q.t==="multi")?[]:null;Q.match={};
 const prog=Math.round((Q.i)/Q.list.length*100);
 const typeLabel={single:"單選題",multi:"多選題（可複選）",fill:"填空題",match:"配對題",scenario:"情境題"}[q.t];
 let body="";
 if(q.t==="single"||q.t==="scenario"){body=`<div class="opts" id="opts">${shuffle(q.o).map(o=>`<div class="opt" data-v="${esc(o)}" onclick="pickOne(this)"><div class="box">✓</div><div>${esc(o)}</div></div>`).join("")}</div>`;}
 else if(q.t==="multi"){body=`<div class="opts" id="opts">${shuffle(q.o).map(o=>`<div class="opt multi" data-v="${esc(o)}" onclick="pickMulti(this)"><div class="box">✓</div><div>${esc(o)}</div></div>`).join("")}</div>`;}
 else if(q.t==="fill"){body=`<input class="fillbox" id="fillin" placeholder="輸入答案" autocomplete="off" onkeydown="if(event.key==='Enter')submitQ()">`;}
 else if(q.t==="match"){const rights=shuffle(Object.values(q.pairs));body=`<div id="opts">${Object.keys(q.pairs).map(k=>`<div class="matchrow" data-k="${esc(k)}"><div class="ml">${esc(k)}</div><select onchange="Q.match['${esc(k)}']=this.value"><option value="">— 選擇 —</option>${rights.map(r=>`<option value="${esc(r)}">${esc(r)}</option>`).join("")}</select></div>`).join("")}</div>`;}
 const modeLabel={wrong:"🔁 錯題重練",review:(Q.stage==="c8_review"?"🗡️ 錯題清算":"🗡️ 今日複習"),trial:"⚔️ 試煉關",boss:(Q.stage==="c8_boss"?"👑 最終Boss":"👹 Boss 戰")}[Q.mode]||"";
 view().innerHTML=`<div class="qwrap">
   <div class="qtop"><span>${modeLabel?modeLabel+" · ":""}第 ${Q.i+1} / ${Q.list.length} 題</span><span style="display:inline-flex;gap:8px;align-items:center">${Q.mode==="boss"?heartsHTML(-1):""}<span id="comboChip" class="${Q.combo>=2?'chip gold':''}">${Q.combo>=2?"🔥 連對 "+Q.combo:""}</span><span class="chip green">✓ ${Q.correct}</span></span></div>
   <div class="bar qprog"><i style="width:${prog}%"></i></div>
   <div class="qcard">
     <div class="qtype">${typeLabel}</div>
     <p class="qtext">${esc(q.q)}</p>
     ${body}
     <div id="explbox"></div>
     <div style="margin-top:18px" id="qbtn"><button class="btn btn-p" onclick="submitQ()">送出答案</button></div>
   </div>
   <div style="margin-top:14px"><button class="btn btn-ghost" onclick="quitQuiz()">結束測驗</button></div>
 </div>`;
}
function pickOne(el){if(Q.answered)return;SFX.tap();document.querySelectorAll("#opts .opt").forEach(o=>o.classList.remove("sel"));el.classList.add("sel");Q.sel=el.dataset.v;}
function pickMulti(el){if(Q.answered)return;SFX.tap();el.classList.toggle("sel");const v=el.dataset.v;if(Q.sel.includes(v))Q.sel=Q.sel.filter(x=>x!==v);else Q.sel.push(v);}

function normFill(s){return String(s||"").trim().replace(/\s/g,"").replace(/宮$/,"");}
function submitQ(){
 if(Q.answered){nextQ();return;}
 const q=Q.list[Q.i];let ok=false,correctText="";
 if(q.t==="single"||q.t==="scenario"){if(Q.sel==null){toast("請先選一個答案");return;}ok=(Q.sel===q.a);correctText=q.a;}
 else if(q.t==="multi"){if(!Q.sel.length){toast("請至少選一項");return;}const A=q.a.slice().sort().join("|");const B=Q.sel.slice().sort().join("|");ok=(A===B);correctText=q.a.join("、");}
 else if(q.t==="fill"){const inp=$("#fillin").value;if(!inp.trim()){toast("請輸入答案");return;}ok=(normFill(inp)===normFill(q.a));correctText=q.a;}
 else if(q.t==="match"){const keys=Object.keys(q.pairs);if(keys.some(k=>!Q.match[k])){toast("請完成所有配對");return;}ok=keys.every(k=>Q.match[k]===q.pairs[k]);correctText=keys.map(k=>k+"→"+q.pairs[k]).join("；");}

 Q.answered=true;
 // 視覺標記
 if(q.t==="single"||q.t==="scenario"||q.t==="multi"){document.querySelectorAll("#opts .opt").forEach(o=>{o.classList.add("locked");o.onclick=null;const v=o.dataset.v;const isAns=(q.t==="multi")?q.a.includes(v):v===q.a;const chosen=(q.t==="multi")?Q.sel.includes(v):v===Q.sel;if(isAns)o.classList.add("correct");else if(chosen)o.classList.add("wrong");});}
 else if(q.t==="fill"){const el=$("#fillin");el.disabled=true;el.style.borderColor=ok?"var(--ok)":"var(--no)";el.style.color=ok?"var(--ok)":"var(--no)";}
 else if(q.t==="match"){document.querySelectorAll(".matchrow").forEach(r=>{const k=r.dataset.k;const good=Q.match[k]===q.pairs[k];r.classList.add(good?"mok":"mno");r.querySelector("select").disabled=true;});}

 /* ===== v5.1 批3 一次到位（順序固定：判分 → combo → XP → wrong{}.box → questEvent）；本輪後凍結 ===== */
 S.quiz.answered++;
 let bonus=0,xp=0,firstOfDay=false;
 if(ok){
  Q.correct++;S.quiz.correct++;
  /* 2) combo：答對且計全額才 ++；bonus=min(max(combo-2,0),5) */
  touchQday();
  firstOfDay=!S.qday.ids.includes(q.id);
  if(firstOfDay){Q.combo++;bonus=Math.min(Math.max(Q.combo-2,0),5);}
  /* 3) XP：當日首次答對 5+bonus 並記入 qday；當日重複只 +1、不進 combo；答錯 0 */
  if(firstOfDay){xp=5+bonus;S.qday.ids.push(q.id);}else{xp=1;}
  if(Q.combo>S.counters.comboBest)S.counters.comboBest=Q.combo;
  SFX.ok(Math.pow(1.06,Q.combo));
 }else{
  Q.combo=0;
  if(Q.mode==="boss")Q.hearts=Math.max(0,Q.hearts-1);
  SFX.no();
 }
 /* 4) 錯題 Leitner（⚠️行為變更：一般測驗答對不再直接 resolved，一律走 box 三關畢業） */
 if(!ok){
  if(!S.wrong[q.id])S.wrong[q.id]={count:0,resolved:false,box:0,last:""};
  onReviewAnswer(q.id,false);
 }else if((Q.mode==="wrong"||Q.mode==="review")&&S.wrong[q.id]&&!S.wrong[q.id].resolved){
  if(onReviewAnswer(q.id,true))Q.graduated++;
 }
 Q.xpGain+=xp;
 save();
 /* 5) 事件 */
 if(ok)questEvent("quiz_correct",{qid:q.id,topic:q.topic,firstOfDay:firstOfDay,combo:Q.combo});

 /* combo chip／Boss 愛心 UI 更新 */
 const cc=$("#comboChip");
 if(cc){cc.className=Q.combo>=2?"chip gold":"";cc.innerHTML=Q.combo>=2?"🔥 連對 "+Q.combo:"";}
 if(Q.mode==="boss"){const hh=$("#qhearts");if(hh)hh.outerHTML=heartsHTML(ok?-1:Q.hearts);}

 $("#explbox").innerHTML=`<div class="expl ${ok?'ok':'no'}"><div class="r">${ok?"✓ 答對了":"✗ 答錯了"}${ok&&Q.combo>=3?` · 🔥連擊 +${bonus}`:""}</div>
   ${ok?"":`<div style="margin-bottom:6px">正確答案：<span class="ans">${esc(correctText)}</span></div>`}
   <div>${esc(q.e)}</div></div>`;
 const dead=(Q.mode==="boss"&&Q.hearts<=0);
 const last=Q.i>=Q.list.length-1;
 $("#qbtn").innerHTML=dead
  ?`<button class="btn btn-p" onclick="finishQuiz()">💔 心碎耗盡 · 看結果</button>`
  :`<button class="btn ${ok?'btn-g':'btn-p'}" onclick="${last?'finishQuiz()':'nextQ()'}">${last?"看成績 →":"下一題 →"}</button>`;
 if(xp)addXP(xp);
}
function nextQ(){Q.i++;renderQ();}
function quitQuiz(){if(Q.i>0||Q.answered){finishQuiz();}else{go('quiz');}}

function finishQuiz(){
 if(Q.stage){finishStage();return;} /* v5.1 批3：關卡制走專屬結算 */
 const total=Q.answered?Q.i+1:Q.i; // 已作答題數
 const done=Math.max(1,Q.list.length);
 const correct=Q.correct;const rate=Math.round(correct/done*100);
 if(rate>S.bestScore){S.bestScore=rate;save();}
 questEvent("quiz_finish",{total:total,planned:Q.list.length,correct:correct});
 if(Q.mode==="review")questEvent("reviewDone",{due:Q.list.length,correct:correct,graduated:Q.graduated||0});
 SFX.level.call&&null;
 let msg,em;
 if(rate===100){em="🏆";msg="滿分！星盤了然於心";}
 else if(rate>=80){em="✨";msg="表現優異，繼續精進";}
 else if(rate>=60){em="📖";msg="不錯，錯題再複習一輪";}
 else{em="🌱";msg="打好基礎，回學習中心再讀一次";}
 const wrongN=Object.values(S.wrong).filter(w=>!w.resolved).length;
 view().innerHTML=`<div class="result">
   <div style="font-size:52px">${em}</div>
   <div class="score">${correct}<small>/${done}</small></div>
   <div class="rankname" style="font-size:20px;margin-bottom:4px">正確率 ${rate}%</div>
   <div class="rmsg">${msg}</div>
   <div class="rstats">
     <div class="stat green"><b>+${Q.xpGain||0}</b><span>本次獲得 XP</span></div>
     <div class="stat gold"><b>${wrongN}</b><span>待複習錯題</span></div>
   </div>
   <div class="grid" style="gap:10px">
     ${wrongN?`<button class="btn btn-p" onclick="startWrongQuiz()">🔁 立即重練錯題</button>`:``}
     <button class="btn btn-g" onclick="go('quiz')">再測一次</button>
     <button class="btn btn-ghost" onclick="go('home')">回首頁</button>
   </div>
 </div>`;
 window.scrollTo(0,0);
}

/* ---- v5.1 批3：關卡結算（試煉／Boss／錯題清算） ---- */
function finishStage(){
 const id=Q.stage;const cid=stageChapter(id);const st=stageType(id);
 const total=Q.list.length;const rate=Math.round(Q.correct/total*100);
 const dead=(Q.mode==="boss"&&Q.hearts<=0);
 const answeredAll=(Q.i>=total-1&&Q.answered);
 const pass=!dead&&answeredAll&&Q.correct>=Q.need;
 questEvent("quiz_finish",{total:(Q.answered?Q.i+1:Q.i),planned:total,correct:Q.correct});
 if(Q.mode==="review")questEvent("reviewDone",{due:total,correct:Q.correct,graduated:Q.graduated||0});
 let res=null;
 if(pass)res=clearStage(id,rate);
 const seqIdx=STAGE_SEQ.indexOf(id);const nextId=(pass&&seqIdx>=0&&seqIdx<STAGE_SEQ.length-1)?STAGE_SEQ[seqIdx+1]:null;
 const em=pass?(id==="c8_boss"?"👑":(st==="boss"?"🏆":"🎉")):"💔";
 const msg=pass
  ?(res.first?`過關獎勵 +${res.xp} XP${res.chBonus?`，本章通關再 +${res.chBonus} XP`:""}`:`已通關過 · 更新最佳成績 ${res.best} 分（不重發 XP）`)
  :(dead?"三顆心已耗盡，立即失敗——重打會重新抽題，捲土重來":"未達過關標準，再試一次");
 const gainTotal=(Q.xpGain||0)+(res&&res.first?res.xp+res.chBonus:0);
 view().innerHTML=`<div class="result">
   <div style="font-size:52px">${em}</div>
   ${Q.mode==="boss"?`<div style="font-size:22px;margin:4px 0">${"❤️".repeat(Q.hearts)}${"🖤".repeat(3-Q.hearts)}</div>`:""}
   <div class="score">${Q.correct}<small>/${total}</small></div>
   <div class="rankname" style="font-size:20px;margin-bottom:4px">${stageTitle(id)} · ${pass?"通關":"失敗"}</div>
   <div class="rmsg">${msg}</div>
   <div class="rstats">
     <div class="stat green"><b>+${gainTotal}</b><span>本場合計 XP</span></div>
     <div class="stat gold"><b>${rate}%</b><span>正確率</span></div>
   </div>
   <div class="grid" style="gap:10px">
     ${pass?"":`<button class="btn btn-p" onclick="startStage('${id}')">🔁 重打（重新抽題）</button>`}
     ${nextId?`<button class="btn btn-p" onclick="go('learn');openStage('${nextId}')">下一關 →</button>`:""}
     <button class="btn btn-g" onclick="go('learn')">回修行地圖</button>
   </div>
 </div>`;
 if(id==="c8_boss"&&pass&&res&&res.first)toast("🏆 獲得徽章「星盤大師」✦");
 window.scrollTo(0,0);
}

/* ======================= 我的 ======================= */
function viewMe(){
 const L=levelInfo(S.xp);const acc=S.quiz.answered?Math.round(S.quiz.correct/S.quiz.answered*100):0;
 const badges=computeBadges();
 return `<div class="eyebrow">個人 · 修習進度</div><h2 class="title">我的研習</h2>
 <div class="card" style="margin-bottom:16px">
   <div class="rankrow"><div class="rankname"><small>Lv.${L.lv}</small>${esc(L.title)}</div><div class="xpnum">${S.xp} XP</div></div>
   <div class="bar"><i style="width:${Math.round(L.prog*100)}%"></i></div>
   <div class="stats3" style="margin-bottom:0"><div class="stat gold"><b>${totalLearned()}</b><span>已學 /${TOTAL_CARDS}</span></div><div class="stat purple"><b>${S.quiz.answered}</b><span>已答題數</span></div><div class="stat green"><b>${acc}%</b><span>正確率</span></div></div>
 </div>

 <div class="grouphdr">修習階級</div>
 <div class="rankladder">${LEVELS.map(x=>{const reached=S.xp>=x.xp;const cur=x.lv===L.lv;return `<div class="rl ${cur?'cur':(reached?'reached':'')}"><div class="lv">Lv.${x.lv}</div><div class="nm">${esc(x.title)}</div><div class="st">${cur?"● 目前":(reached?"✓":x.xp+" XP")}</div></div>`;}).join("")}</div>

 <div class="grouphdr">成就徽章</div>
 <div class="badges">${badges.map(b=>`<div class="badge ${b.got?'got':''}"><div class="em">${b.got?b.em:"🔒"}</div><div><div class="bn">${b.n}</div><div class="bd">${b.d}</div></div></div>`).join("")}</div>

 <div class="grouphdr">未來藍圖 · v3</div>
 <p style="font-size:12px;color:var(--muted);margin:0 0 10px">規劃中的進階功能，讓系統更完整（本版先列計劃）：</p>
 <div class="cardlist">${V3PLAN.map(x=>`<div class="card" style="padding:13px 15px${x.done?';border-color:var(--green)':''}"><h4 style="font-family:'Noto Serif TC',serif;font-size:15px;margin:0 0 4px"><span style="margin-right:6px">${x.em}</span>${esc(x.t)} <span class="chip" style="font-size:9px;padding:1px 6px;color:${x.done?'var(--green)':'var(--muted2)'}${x.done?';border-color:var(--green)':''}">${x.done?'已完成':'規劃中'}</span></h4><div style="font-size:12px;color:var(--muted);line-height:1.6">${esc(x.d)}</div></div>`).join("")}</div>
 <a href="https://www.fatemaster.ai/zh/workspace/ziwei-doushu" target="_blank" rel="noopener" style="text-decoration:none;display:block;margin-top:12px"><div class="btn btn-ghost">🔮 前往自動排盤（fatemaster）→</div></a>

 <div class="grouphdr">設定</div>
 <div class="setrow"><div class="l"><b>音效</b><span>答題與升級的合成音效</span></div><div class="toggle ${S.sound?'on':''}" onclick="toggleSound(this)"></div></div>
 <div class="setrow" onclick="resetAll()" style="cursor:pointer"><div class="l"><b style="color:var(--red)">清除學習紀錄</b><span>重設所有進度、經驗值與錯題（此裝置）</span></div><div class="arrow" style="color:var(--muted2);font-size:20px">›</div></div>
 <div class="note" style="margin-top:14px">學習紀錄儲存在此瀏覽器（本機）。換裝置或清除瀏覽資料會消失。</div>
 <div style="text-align:center;color:var(--muted2);font-size:11.5px;margin-top:18px;letter-spacing:.05em">紫微斗數 · 星曜研習　<b style="color:var(--gold-d)">${APP_VERSION}</b></div>`;
}
function computeBadges(){
 const full=c=>S.learned[c].length>= ({palace:PALACES.length,star:STARS.length,sihua:SIHUA.length,aux:AUX.length,duo:DUO.length,frame:FRAME.length,daxian:DAXIAN.length,shensha:SHENSHA.length}[c]);
 return [
  {n:"命盤入門",d:"學會全部十二宮",em:"🏛️",got:full("palace")},
  {n:"星曜通曉",d:"學會全部十四主星",em:"⭐",got:full("star")},
  {n:"四化貫通",d:"學會全部四化",em:"🔮",got:full("sihua")},
  {n:"眾星羅列",d:"學會全部輔星煞曜",em:"✧",got:full("aux")},
  {n:"雙星入門",d:"學會全部 24 組雙星",em:"♊",got:full("duo")},
  {n:"識得格局",d:"學會三大框架",em:"🗺️",got:full("frame")},
  {n:"懂看大限",d:"學會大限流年 5 卡",em:"⏳",got:full("daxian")},
  {n:"通曉神煞",d:"學會神煞十二神四套",em:"🎖️",got:full("shensha")},
  {n:"百題磨練",d:"累積答題滿 100 題",em:"✍️",got:S.quiz.answered>=100},
  {n:"滿分達人",d:"單次測驗拿到滿分",em:"💯",got:S.bestScore>=100}, /* v5.1：原「星盤大師」改名保留，條件不變（老用戶成就不消失） */
  {n:"星盤大師",d:"通過第八章最終試煉 Boss",em:"👑",got:!!(S.quest.stages.c8_boss&&S.quest.stages.c8_boss.cleared)}, /* v5.1 批3 */
 ];
}
function toggleSound(el){S.sound=!S.sound;save();el.classList.toggle("on",S.sound);if(S.sound)SFX.ok();}
function resetAll(){if(confirm("確定要清除所有學習紀錄嗎？此動作無法復原。")){S=JSON.parse(JSON.stringify(DEFAULT));save();toast("已清除，重新開始 ✦");go('home');}}

/* ======================= Modal ======================= */
function openSheet(inner){const m=$("#modal");m.className="modal";m.innerHTML=`<div class="sheet" onclick="event.stopPropagation()"><div class="grab"></div>${inner}</div>`;m.onclick=closeModal;document.body.style.overflow="hidden";}
function closeModal(){const m=$("#modal");m.className="";m.innerHTML="";document.body.style.overflow="";}

/* ======================= 升級儀式 ======================= */
function ceremony(newLv){const L=LEVELS.find(x=>x.lv===newLv);if(!L)return;SFX.level();const el=$("#lvup");el.hidden=false;el.className="lvup";
 el.innerHTML=`<div class="ray"></div><div class="burst"><div class="up">L E V E L　U P</div><div class="lvbig">Lv.<span>${L.lv}</span></div><div class="ttl">${esc(L.title)}</div><div class="tap">點擊任意處繼續</div></div>`;
 el.querySelector(".burst").classList.add("shake");
 el.onclick=()=>{el.hidden=true;el.className="";el.innerHTML="";};
}

/* ======================= 啟動 ======================= */
(function(){var v=document.getElementById("verTag");if(v)v.textContent=APP_VERSION;})();
/* 自動偵測新版本：抓 version.json（繞過快取），若比目前新→顯示更新提示條 */
(function(){
 try{
  fetch("version.json?t="+(new Date().getTime()),{cache:"no-store"})
   .then(function(r){return r.json();})
   .then(function(j){
     if(j&&j.version&&j.version!==APP_VERSION){
       var b=document.getElementById("updbar");if(!b)return;
       b.querySelector("span").textContent="🔄 有新版本 "+j.version+"（目前 "+APP_VERSION+"）· 點我更新";
       b.style.display="flex";
       b.onclick=function(){location.href=location.pathname+"?v="+encodeURIComponent(j.version)+"_"+(new Date().getTime());};
     }
   }).catch(function(){});
 }catch(e){}
})();
render();
</script>
</body>
</html>
